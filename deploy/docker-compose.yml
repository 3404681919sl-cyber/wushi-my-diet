# 吾食（Wushi）本地开发环境
# 启动 PostgreSQL（主库）+ 可选 Redis（F4 缓存 / 任务队列）
#
# 使用：
#   docker compose up -d postgres        # 仅启动数据库
#   docker compose up -d                 # 启动全部（含 redis）
#
# 连接串示例（写入 apps/api/.env 的 DATABASE_URL）：
#   postgresql+asyncpg://wushi:wushi@localhost:5432/wushi

services:
  postgres:
    image: postgres:16-alpine
    container_name: wushi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wushi
      POSTGRES_PASSWORD: wushi
      POSTGRES_DB: wushi
    ports:
      - "5432:5432"
    volumes:
      - wushi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wushi -d wushi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 可选：Redis（F4 缓存 / 异步任务队列，本期未强制启用）
  redis:
    image: redis:7-alpine
    container_name: wushi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    profiles:
      - optional
    volumes:
      - wushi_redisdata:/data

volumes:
  wushi_pgdata:
  wushi_redisdata:
